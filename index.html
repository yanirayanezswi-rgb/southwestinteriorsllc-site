<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Southwest Interiors LLC</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

.navbar {
  background: #1f2f46;
  padding: 15px;
  text-align: center;
}

.navbar a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}

.section {
  display: none;
  padding: 40px 20px;
  text-align: center;
}

.active {
  display: block;
}

.button {
  display: block;
  margin: 10px auto;
  padding: 15px;
  width: 90%;
  max-width: 300px;
  background: #3f5878;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-size: 16px;
}

h1 {
  color: #1f2f46;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="#" onclick="showSection('home')">Home</a>
  <a href="#" onclick="showSection('services')">Services</a>
  <a href="#" onclick="showSection('contact')">Contact</a>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <h1>Southwest Interiors LLC</h1>
  <p>Yanira Yañez – CEO</p>

  <a class="button" href="tel:5022077186">📞 Call Now</a>
  <a class="button" href="sms:5022077186">💬 Text Now</a>
  <a class="button" href="mailto:southwestinteriors@outlook.com">📧 Email</a>

  <p>📍 Louisville, KY</p>
</div>

<!-- SERVICES -->
<div id="services" class="section">
  <h1>Our Services</h1>
  <p>
    Handyman<br><br>
    Interior Repairs<br><br>
    Furnace Maintenance<br><br>
    Garage Doors<br><br>
    Housekeeping<br><br>
    Emergency Services
  </p>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
  <h1>Contact Us</h1>

  <a class="button" href="tel:5022077186">📞 Call</a>
  <a class="button" href="sms:5022077186">💬 Text</a>
  <a class="button" href="mailto:southwestinteriors@outlook.com">📧 Email</a>

  <p>📍 Louisville, KY</p>
</div>

<script>
function showSection(sectionId) {
  let sections = document.querySelectorAll('.section');
  sections.forEach(section => section.classList.remove('active'));
  document.getElementById(sectionId).classList.add('active');
}
</script>

</body>
</html>
