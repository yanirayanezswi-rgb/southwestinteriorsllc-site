<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
  color: #1f2f46;
}
.navbar {
  background: #1f2f46;
  padding: 15px;
  text-align: center;
}
.navbar a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}
.section {
  display: none;
  padding: 40px 20px;
  text-align: center;
}
.section.active {
  display: block;
}
.button {
  display: block;
  margin: 10px auto;
  padding: 15px;
  width: 90%;
  max-width: 320px;
  background: #3f5878;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-size: 16px;
  box-sizing: border-box;
}
h1 {
  color: #1f2f46;
}
</style>
</head>
<body>

<div class="navbar">
  <a href="#" onclick="showSection('home'); return false;">Home</a>
  <a href="#" onclick="showSection('services'); return false;">Services</a>
  <a href="#" onclick="showSection('contact'); return false;">Contact</a>
</div>

<div id="home" class="section active">
  <h1>Southwest Interiors LLC</h1>
  <p>Yanira Yañez – CEO</p>

  <a class="button" href="tel:5022077186">📞 Call Now</a>
  <a class="button" href="sms:5022077186">💬 Text Now</a>

<script>
function showSection(sectionId) {
  const sections = document.querySelectorAll('.section');
  sections.forEach(section => section.classList.remove('active'));
  document.getElementById(sectionId).classList.add('active');
}
</script>

</body>
